# context_window_size = 128_000


# ── Agent ───────────────────────────────────────────────────────────

[agent]
default_provider = "openai-main"     # must match a [[providers]].name
default_model = "gpt-4.1-mini"       # must match a [[providers.models]].name
max_iterations = 10                  # max tool-use rounds per turn (optional)
disabled_toolsets = []               # e.g. ["terminal"] to disable shell access

# Context compression — automatically summarize old messages when the
# context window fills up. Enabled by default.
# context_compression_enabled = true
# context_compression_threshold_percent = 0.50   # trigger at 50% usage


# ── Gateway (uncomment to enable) ───────────────────────────────────
# Run with: perry-hermes gateway run
#
# Required env vars for gateway platforms:
#   TELEGRAM_BOT_TOKEN   — from @BotFather
#   QQ_BOT_APP_ID        — from QQ Open Platform
#   QQ_BOT_APP_SECRET    — from QQ Open Platform

# [gateway.telegram]
# token_env = "TELEGRAM_BOT_TOKEN"   # default; override with token = "..."
# allowed_users = []                 # empty = allow everyone

# [gateway.qqbot]
# app_id_env = "QQ_BOT_APP_ID"      # default
# app_secret_env = "QQ_BOT_APP_SECRET"
# sandbox = false                    # true for QQ sandbox testing
# allowed_users = []
