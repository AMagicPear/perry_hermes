# ──────────────────────────────────────────────────────────────────────
# Perry Hermes — Main Configuration
# ──────────────────────────────────────────────────────────────────────
#
# Copy this file to one of these locations:
#   1. ./perry_hermes.toml               (project-local, recommended)
#   2. ~/.perry_hermes/config.toml       (user-global)
#
# Then set the API key environment variable(s) and run `perry-hermes`.
#
# Config lookup order:
#   --config <path>              (explicit CLI flag)
#   ~/.perry_hermes/config.toml  (user-global)
#   ./perry_hermes.toml          (project-local)
# ──────────────────────────────────────────────────────────────────────


# ── Provider: OpenAI (default) ──────────────────────────────────────
# Works with any OpenAI-compatible API. Change `base_url` for other
# providers (DeepSeek, Ollama, Moonshot, etc.).

[[providers]]
name = "openai-main"
kind = "openai"
api_key_env = "OPENAI_API_KEY"       # env var that holds your API key
base_url = "https://api.openai.com/v1"

[[providers.models]]
name = "gpt-4.1-mini"
context_window_size = 1_047_576      # tokens; must match the model's limit


