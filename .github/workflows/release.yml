name: Release

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Release tag to publish, for example v0.1.3"
        required: true
        type: string
      source_ref:
        description: "Git ref to build from, for example main, v0.1.2, or a commit SHA"
        required: true
        type: string

permissions:
  contents: write

concurrency:
  group: release-${{ inputs.release_tag }}-${{ inputs.source_ref }}
  cancel-in-progress: false

jobs:
  verify:
    runs-on: ubuntu-latest
    outputs:
      release_tag: ${{ steps.meta.outputs.release_tag }}
      source_ref: ${{ steps.meta.outputs.source_ref }}
      source_sha: ${{ steps.meta.outputs.source_sha }}
      workspace_version: ${{ steps.meta.outputs.workspace_version }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.source_ref }}
          fetch-depth: 0

      - name: Validate release metadata
        id: meta
        shell: bash
        run: |
          set -euo pipefail

          release_tag="${{ inputs.release_tag }}"
          source_ref="${{ inputs.source_ref }}"
          if [[ ! "$release_tag" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "release_tag must look like v0.1.3" >&2
            exit 1
          fi

          source_sha="$(git rev-parse HEAD)"
          workspace_version="$(sed -n 's/^version = "\(.*\)"$/\1/p' Cargo.toml | head -n1)"
          expected_tag="v${workspace_version}"

          if [[ "$release_tag" != "$expected_tag" ]]; then
            echo "release_tag $release_tag does not match Cargo.toml version $workspace_version" >&2
            exit 1
          fi

          echo "release_tag=$release_tag" >> "$GITHUB_OUTPUT"
          echo "source_ref=$source_ref" >> "$GITHUB_OUTPUT"
          echo "source_sha=$source_sha" >> "$GITHUB_OUTPUT"
          echo "workspace_version=$workspace_version" >> "$GITHUB_OUTPUT"

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo artifacts
        uses: Swatinem/rust-cache@v2

      - name: Check formatting
        run: cargo fmt --all --check

      - name: Run clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Run tests
        run: cargo test --workspace --quiet

      - name: Create or verify release tag
        shell: bash
        run: |
          set -euo pipefail

          release_tag="${{ steps.meta.outputs.release_tag }}"
          current_sha="${{ steps.meta.outputs.source_sha }}"

          if git rev-parse "$release_tag" >/dev/null 2>&1; then
            tag_sha="$(git rev-list -n 1 "$release_tag")"
            if [[ "$tag_sha" != "$current_sha" ]]; then
              echo "tag $release_tag already exists but does not point to the selected commit" >&2
              exit 1
            fi
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -a "$release_tag" -m "Release $release_tag"
          git push origin "$release_tag"

  build:
    needs: verify
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            binary_name: hermes
          - os: macos-13
            target: x86_64-apple-darwin
            binary_name: hermes
          - os: macos-14
            target: aarch64-apple-darwin
            binary_name: hermes
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            binary_name: hermes.exe
    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.verify.outputs.source_sha }}
          fetch-depth: 0

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo artifacts
        uses: Swatinem/rust-cache@v2

      - name: Build hermes
        run: cargo build --release -p hermes-cli --target ${{ matrix.target }}

      - name: Stage release bundle
        shell: bash
        run: |
          set -euo pipefail

          bundle="perry-hermes-${{ needs.verify.outputs.release_tag }}-${{ matrix.target }}"
          mkdir -p "$bundle/examples/config"

          cp "target/${{ matrix.target }}/release/${{ matrix.binary_name }}" "$bundle/"
          cp README.md LICENSE "$bundle/"

          if [[ -f examples/config/hermes.toml ]]; then
            cp examples/config/hermes.toml "$bundle/examples/config/hermes.toml"
          elif [[ -f crates/hermes-cli/hermes.example.toml ]]; then
            cp crates/hermes-cli/hermes.example.toml "$bundle/examples/config/hermes.toml"
          else
            echo "No example config found in this source revision; skipping config bundle."
            rmdir "$bundle/examples/config" || true
            rmdir "$bundle/examples" || true
          fi

      - name: Upload staged bundle
        uses: actions/upload-artifact@v4
        with:
          name: perry-hermes-${{ needs.verify.outputs.release_tag }}-${{ matrix.target }}
          path: perry-hermes-${{ needs.verify.outputs.release_tag }}-${{ matrix.target }}
          if-no-files-found: error

  publish:
    runs-on: ubuntu-latest
    needs:
      - verify
      - build

    steps:
      - name: Download staged bundles
        uses: actions/download-artifact@v4
        with:
          path: dist

      - name: Create archives
        shell: bash
        run: |
          set -euo pipefail
          shopt -s nullglob

          mkdir -p release-assets

          for bundle_path in dist/*; do
            bundle_name="$(basename "$bundle_path")"
            if [[ "$bundle_name" == *windows* ]]; then
              (
                cd dist
                zip -rq "../release-assets/${bundle_name}.zip" "$bundle_name"
              )
            else
              tar -C dist -czf "release-assets/${bundle_name}.tar.gz" "$bundle_name"
            fi
          done

          ls -lah release-assets

      - name: Create GitHub release and upload assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.verify.outputs.release_tag }}
          generate_release_notes: true
          files: |
            release-assets/*.tar.gz
            release-assets/*.zip
